site_name: ArtCenter
site_url: https://cgilabs.github.io/

theme:
  name: material
  language: ko
  logo: assets/logo.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

  palette:
    - scheme: default
      primary: white
      accent: blue

extra_css:
  - stylesheets/extra.css

plugins:
  - search

nav:
  - Creator:
      - 3D 모델링 준비하기:
          - 모델링 준비하기 - 의상: creator/modeling-ready-cloth.md
          - 모델링 준비하기 - 신발: creator/modeling-ready-shoes.md
          - 모델링 준비하기 - 헤어, 헤드웨어: creator/modeling-ready-hair.md
      - 3D 모델링하기:
          - 3D 모델링하기 - 의상: creator/modeling-cloth.md
          - 3D 모델링하기 - 헤어: creator/modeling-hair.md
      - 3D 맵핑하기: creator/mapping.md
      - 3D 리깅하기: creator/rigging.md
      - Unity Engine: creator/unity.md
      - 3D 컨버팅&내보내기: creator/export.md
  - Icon:
      - Modeling: icon/modeling.md
      - Page: icon/page.md
      - Page 1: icon/page1.md