site_name: CGILABS Docs
site_url: https://cgilabs.github.io/

theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환

nav:
  - Home: index.md
  - Unreal:
      - Week 1: unreal/week01.md
      - Week 2: unreal/week02.md
      - Week 3: unreal/week03.md

plugins:
  - search